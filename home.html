<style>
:root {
  --bg-overlay: rgba(20,20,30,0.2);
  --title-bg: rgba(255,255,255,0.1);
  --text-color: #1e1e2f;
  --navbar-bg: rgba(220,220,240,0.7);
  --window-bg: rgba(245,245,255,0.12);
  --shadow: 0 10px 30px -5px rgba(0,0,0,0.4);
  --border-light: rgba(255,255,255,0.25);
  --toast-bg: rgba(255,255,255,0.75);
  --navbar-height: 80px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-overlay: rgba(0,0,0,0.3);
    --title-bg: rgba(0,0,0,0.25);
    --text-color: #f0eef7;
    --navbar-bg: rgba(40,40,55,0.8);
    --window-bg: rgba(20,20,30,0.18);
    --shadow: 0 10px 30px -5px rgba(0,0,0,0.8);
    --border-light: rgba(255,255,255,0.1);
    --toast-bg: rgba(40,40,55,0.9);
  }
}

* {
  margin:0; padding:0; box-sizing:border-box;
  user-select:none; font-family:system-ui, sans-serif;
}

html,body {
  width:100%; height:100%; overflow:hidden;
  color:var(--text-color);
}

/* 背景：固定为 bp_1_1.jpg */
.bg-slideshow {
  position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
  background-image: url(bp_1_1.jpg);
  background-size: cover;
  background-position: center;
}

/* 导航栏 */
.navbar {
  position:fixed; top:16px; left:10%; width:80%;
  background:var(--navbar-bg); backdrop-filter:blur(20px);
  border-radius:60px; padding:12px 28px;
  display:flex; justify-content:space-between; align-items:center;
  box-shadow:var(--shadow); border:1px solid var(--border-light);
  z-index:200;
}
.navbar .title {
  font-size:1.3rem;
  background:linear-gradient(135deg,#b983ff,#77e5ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  font-weight:700;
}
.navbar .datetime {
  font-size:1rem; background:rgba(255,255,255,0.2);
  padding:6px 14px; border-radius:40px;
}

/* 提示 */
.toast {
  position:fixed; left:5px;
  width:340px;
  background:var(--toast-bg); backdrop-filter:blur(20px);
  border-radius:10px;
  padding:12px 16px 24px 16px;
  box-shadow:var(--shadow); border:1px solid var(--border-light);
  z-index:999;
  transition: opacity 0.8s ease;
  overflow:hidden;
}
.toast.fade { opacity:0; }
.toast-bar {
  position:absolute; bottom:0; left:0;
  height:3px; width:100%;
  border-radius:0 0 10px 10px;
  transition:width linear;
}

.toast-pc { top:var(--navbar-height); }
.toast-pc .toast-bar { background:#22c55e; transition-duration:4.5s; }
.toast-mobile { display:none; }

/* 窗口 */
.desktop {
  position:relative; width:100%; height:100%;
  padding-top:var(--navbar-height);
}
.window {
  position:absolute;
  border-radius:14px;
  border:2px solid;
  background:var(--window-bg);
  backdrop-filter:blur(24px);
  box-shadow:var(--shadow);
  z-index:10;
  min-width:220px; min-height:180px;
  overflow:hidden;
}
.titlebar {
  padding:8px 14px;
  background:var(--title-bg); backdrop-filter:blur(10px);
  border-radius:12px 12px 0 0;
  cursor:grab;
  border-bottom:1px solid var(--border-light);
}
.titlebar:active { cursor:grabbing; }
.window-title {
  font-weight:600; font-size:1.1rem;
  word-break:break-word;  /* 长标题换行 */
}
.window-content {
  padding:16px 14px;
  height:calc(100% - 48px);
  overflow-y:auto;
  user-select:text;
}
.content-img {
  width:100%; border-radius:12px; margin:8px 0;
}
.placeholder {
  text-align:center; padding:15px;
  background:rgba(255,255,255,0.05); border-radius:14px;
  margin:8px 0;
}
.resize-arrow {
  position:absolute;
  right:2px; bottom:2px;
  width:24px; height:24px;
  opacity:0.4;
  cursor:se-resize;
  z-index:30;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
  color:var(--text-color);
}
.resize-arrow:hover { opacity:1; }

/* 关于我们窗口的自定义样式 */
.about-content {
  line-height:1.6;
}
.about-content h3 {
  font-size:1.2rem;
  margin:12px 0 8px 0;
  color:#b983ff;
}
.about-content p {
  margin:6px 0;
  font-size:0.95rem;
}
/* 核心：图文并列容器 */
.about-side-by-side {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 16px 0;
  flex-wrap: wrap;
}
.about-text-col {
  flex: 1;
  min-width: 240px;
}
.about-img-col {
  flex: 0 0 150px;
}
.about-img-col img {
  width: 100%;
  height: 100%;
  border-radius: 8px;
  border: 2px solid var(--border-light);
}
.about-img-col p {
  text-align: center;
  margin-top: 8px;
  font-weight: 600;
}

.about-content .contact-info {
  margin:10px 0;
}
.about-content .contact-info p {
  display:flex;
  align-items:center;
  gap:8px;
}
.about-content .contact-info i {
  color:#77e5ff;
  width:20px;
  text-align:center;
}
.about-content ol {
  padding-left:20px;
  margin:8px 0;
}
.about-content ol li {
  margin:4px 0;
}

/* ---------- 合作服列表样式 ---------- */
.coop-list {
  margin: 8px 0;
}
.coop-item {
  display: flex;
  align-items: center;
  padding: 12px 14px;

  border-radius: 14px;
  text-decoration: none;
  color: inherit;

  margin-bottom: 8px;
}
.coop-item:hover {

  border-color: var(--border-light);
}
.coop-item img {
  width: 24px;
  height: 24px;
  margin-right: 12px;
  border-radius: 6px;
  object-fit: contain;
}

/* 手机端 */
@media (max-width:600px) {
  html,body { overflow-y:auto; height:auto; }
  .desktop {
    padding-top:120px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    padding-bottom:40px;
  }

    position:relative !important;
    width:92% !important;
    height:auto !important;

  }
  .titlebar { cursor:default; }
  .resize-arrow { display:none; }

/* 内部轮播样式 */
.in-carousel {
  position: relative;
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}
.in-carousel-inner {

  width: 100%;
  height: 160px;
}
.in-carousel-item {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1.5s ease;
}
.in-carousel-item.active { opacity: 1; }
.in-carousel-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

  const w = ['日','一','二','三','四','五','六'][now.getDay()];

  const mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('datetime').innerText = `${y}.${m}.${d} 周${w} ${hh}:${mm}`;
}

// 创建窗口
function createWindows() {
  desk.innerHTML = '';
  const isMobile = window.innerWidth <= 600;
  const list = isMobile ? mobileWindows : desktopWindows;

  list.forEach(item => {
    const win = document.createElement('div');
    win.className = 'window';
    win.style.borderColor = item.borderColor;
    if (!isMobile) {
      win.style.width = item.w + 'px';
      win.style.height = item.h + 'px';
      win.style.left = item.x + 'px';
      win.style.top = item.y + 'px';
    }

    const bar = document.createElement('div');
    bar.className = 'titlebar';
    const t = document.createElement('div');
    t.className = 'window-title';
    t.innerText = item.title;
    bar.appendChild(t);

    const c = document.createElement('div');
    c.className = 'window-content';
    c.innerHTML = item.html;

    const r = document.createElement('div');
    r.className = 'resize-arrow';
    r.innerText = '⤢';

    win.append(bar, c, r);
    desk.appendChild(win);

    // 置顶
    win.addEventListener('mousedown', () => {
      win.style.zIndex = ++zIndex;
    });

    // 拖动
    let drag = false, sx=0, sy=0, ox=0, oy=0;
    const nh = 80;
    bar.addEventListener('mousedown', e => {
      if (isMobile) return;
      e.preventDefault();
      drag = true;
      sx = e.clientX; sy = e.clientY;
      ox = win.offsetLeft; oy = win.offsetTop;
    });
    window.addEventListener('mousemove', e => {
      if (!drag) return;
      let nx = ox + e.clientX - sx;
      let ny = oy + e.clientY - sy;
      nx = Math.max(0, Math.min(nx, window.innerWidth - win.offsetWidth));
      ny = Math.max(nh + 10, Math.min(ny, window.innerHeight - win.offsetHeight));
      win.style.left = nx + 'px';
      win.style.top = ny + 'px';
    });
    window.addEventListener('mouseup', () => drag = false);

    // 缩放
    let resize = false;
    r.addEventListener('mousedown', e => {
      if (isMobile) return;
      e.stopPropagation();
      resize = true;
    });
    window.addEventListener('mousemove', e => {
      if (!resize) return;
      let w = e.clientX - win.offsetLeft;
      let h = e.clientY - win.offsetTop;
      w = Math.max(220, Math.min(w, window.innerWidth - win.offsetLeft));
      h = Math.max(180, Math.min(h, window.innerHeight - win.offsetTop));
      win.style.width = w + 'px';
      win.style.height = h + 'px';
    });
    window.addEventListener('mouseup', () => resize = false);
  });
}

createWindows();
window.addEventListener('resize', createWindows);

// 内部轮播
setInterval(() => {
  const items = document.querySelectorAll('.in-carousel-item');
  if (!items.length) return;
  let cur = [...items].findIndex(i => i.classList.contains('active'));
  items[cur].classList.remove('active');
  cur = (cur + 1) % items.length;
  items[cur].classList.add('active');
}, 5000);
</script>
