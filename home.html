<style>
:root {
  --bg-overlay: rgba(20,20,30,0.2);
  --title-bg: rgba(255,255,255,0.1);
  --text-color: #1e1e2f;
  --navbar-bg: rgba(220,220,240,0.7);
  --window-bg: rgba(245,245,255,0.12);
  --shadow: 0 10px 30px -5px rgba(0,0,0,0.4);
  --border-light: rgba(255,255,255,0.25);
  --toast-bg: rgba(255,255,255,0.75);
  --navbar-height: 80px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-overlay: rgba(0,0,0,0.3);
    --title-bg: rgba(0,0,0,0.25);
    --text-color: #f0eef7;
    --navbar-bg: rgba(40,40,55,0.8);
    --window-bg: rgba(20,20,30,0.18);
    --shadow: 0 10px 30px -5px rgba(0,0,0,0.8);
    --border-light: rgba(255,255,255,0.1);
    --toast-bg: rgba(40,40,55,0.9);
  }
}

* {
  margin:0; padding:0; box-sizing:border-box;
  user-select:none; font-family:system-ui, sans-serif;
}

html,body {
  width:100%; height:100%; overflow:hidden;
  color:var(--text-color);
}

/* 背景：固定为 bp_1_1.jpg */
.bg-slideshow {
  position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;
  background-image: url(bp_1_1.jpg);
  background-size: cover;
  background-position: center;
}

/* 导航栏 */
.navbar {
  position:fixed; top:16px; left:10%; width:80%;
  background:var(--navbar-bg); backdrop-filter:blur(20px);
  border-radius:60px; padding:12px 28px;
  display:flex; justify-content:space-between; align-items:center;
  box-shadow:var(--shadow); border:1px solid var(--border-light);
  z-index:200;
}
.navbar .title {
  font-size:1.3rem;
  background:linear-gradient(135deg,#b983ff,#77e5ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  font-weight:700;
}
.navbar .datetime {
  font-size:1rem; background:rgba(255,255,255,0.2);
  padding:6px 14px; border-radius:40px;
}

/* 提示 */
.toast {
  position:fixed; left:5px;
  width:340px;
  background:var(--toast-bg); backdrop-filter:blur(20px);
  border-radius:10px;
  padding:12px 16px 24px 16px;
  box-shadow:var(--shadow); border:1px solid var(--border-light);
  z-index:999;
  transition: opacity 0.8s ease;
  overflow:hidden;
}
.toast.fade { opacity:0; }
.toast-bar {
  position:absolute; bottom:0; left:0;
  height:3px; width:100%;
  border-radius:0 0 10px 10px;
  transition:width linear;
}

.toast-pc {
  top:var(--navbar-height);
}
.toast-pc .toast-bar {
  background:#22c55e;
  transition-duration:4.5s;
}

/* 手机提示默认隐藏 */
.toast-mobile {
  display: none;
  top:var(--navbar-height);
}
.toast-mobile .toast-bar {
  background:#f97316;  /* 橙色 */
  transition-duration:7s;
}

/* 窗口 */
.desktop {
  position:relative; width:100%; height:100%;
  padding-top:var(--navbar-height);
}
.window {
  position:absolute;
  border-radius:14px;
  border:2px solid;
  background:var(--window-bg);
  backdrop-filter:blur(24px);
  box-shadow:var(--shadow);
  z-index:10;
  min-width:220px; min-height:180px;
  overflow:hidden;
}
.titlebar {
  padding:8px 14px;
  background:var(--title-bg); backdrop-filter:blur(10px);
  border-radius:12px 12px 0 0;
  cursor:grab;
  border-bottom:1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.titlebar:active { cursor:grabbing; }
.window-title {
  font-weight:600; font-size:1.1rem;
  word-break:break-word;
}
.close-btn {
  cursor: pointer;
  font-size: 1.2rem;
  line-height: 1;
  padding: 0 6px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  transition: background 0.2s;
  user-select: none;
}
.close-btn:hover {
  background: rgba(255,80,80,0.5);
}
.window-content {
  padding:16px 14px;
  height:calc(100% - 48px);
  overflow-y:auto;
  user-select:text;
}
.content-img {
  width:100%; border-radius:12px; margin:8px 0;
}
.placeholder {
  text-align:center; padding:15px;
  background:rgba(255,255,255,0.05); border-radius:14px;
  margin:8px 0;
}
.resize-arrow {

  right:2px; bottom:2px;

.resize-arrow:hover { opacity:1; }

// --- 通用窗口创建函数 (保持原有逻辑) ---
function createWindows() {
  desk.innerHTML = '';
  const isMobile = window.innerWidth <= 600;
  const list = isMobile ? mobileWindows : desktopWindows;

  list.forEach(item => {
    const win = document.createElement('div');
    win.className = 'window';
    win.style.borderColor = item.borderColor;
    if (!isMobile) {
      win.style.width = item.w + 'px';
      win.style.height = item.h + 'px';
      win.style.left = item.x + 'px';
      win.style.top = item.y + 'px';
    }

    const bar = document.createElement('div');
    bar.className = 'titlebar';
    const t = document.createElement('div');
    t.className = 'window-title';
    t.innerText = item.title;
    bar.appendChild(t);

    const c = document.createElement('div');
    c.className = 'window-content';
    c.innerHTML = item.html;

    const r = document.createElement('div');
    r.className = 'resize-arrow';
    r.innerText = '⤢';

    win.append(bar, c, r);
    desk.appendChild(win);

    // 置顶
    win.addEventListener('mousedown', () => {
      win.style.zIndex = ++zIndex;
    });

    // 拖动
    let drag = false, sx=0, sy=0, ox=0, oy=0;
    const nh = 80;
    bar.addEventListener('mousedown', e => {
      if (isMobile) return;
      e.preventDefault();
      drag = true;
      sx = e.clientX; sy = e.clientY;
      ox = win.offsetLeft; oy = win.offsetTop;
    });
    window.addEventListener('mousemove', e => {
      if (!drag) return;
      let nx = ox + e.clientX - sx;
      let ny = oy + e.clientY - sy;
      nx = Math.max(0, Math.min(nx, window.innerWidth - win.offsetWidth));
      ny = Math.max(nh + 10, Math.min(ny, window.innerHeight - win.offsetHeight));
      win.style.left = nx + 'px';
      win.style.top = ny + 'px';
    });
    window.addEventListener('mouseup', () => drag = false);

    // 缩放
    let resize = false;
    r.addEventListener('mousedown', e => {
      if (isMobile) return;
      e.stopPropagation();
      resize = true;
    });
    window.addEventListener('mousemove', e => {
      if (!resize) return;
      let w = e.clientX - win.offsetLeft;
      let h = e.clientY - win.offsetTop;
      w = Math.max(220, Math.min(w, window.innerWidth - win.offsetLeft));
      h = Math.max(180, Math.min(h, window.innerHeight - win.offsetTop));
      win.style.width = w + 'px';
      win.style.height = h + 'px';
    });
    window.addEventListener('mouseup', () => resize = false);
  });
}

createWindows();
window.addEventListener('resize', createWindows);

  cur = (cur + 1) % items.length;

}, 5000);

function createImagePopup(imgSrc) {
  const isMobile = window.innerWidth <= 600;
  const win = document.createElement('div');
  win.className = 'window image-popup';
  win.style.borderColor = '#aa88ff';
  win.style.zIndex = ++zIndex;

  // 窗口大小/位置 (PC用绝对定位, 手机强制fixed由CSS处理)
  if (!isMobile) {
    win.style.width = '540px';
    win.style.height = '420px';
    win.style.left = '200px';
    win.style.top = '120px';
  } else {
    // 手机端使用fixed, 已在media中定义, 但需添加类
    win.style.position = 'fixed';
    win.style.top = '5%';
    win.style.left = '5%';
    win.style.width = '90%';
    win.style.height = '80%';
  }

  // 标题栏带关闭按钮
  const bar = document.createElement('div');
  bar.className = 'titlebar';
  const t = document.createElement('div');
  t.className = 'window-title';
  t.innerText = '🔍 图片预览';
  const closeBtn = document.createElement('span');
  closeBtn.className = 'close-btn';
  closeBtn.innerText = '✕';
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    win.remove();
  });
  bar.appendChild(t);
  bar.appendChild(closeBtn);

  // 内容区：带滚动条的容器 + img
  const content = document.createElement('div');
  content.className = 'window-content';
  const container = document.createElement('div');
  container.className = 'img-preview-container';
  const img = document.createElement('img');
  img.src = imgSrc;
  img.alt = 'preview';
  img.style.width = '100%';   // 初始百分比
  img.style.cursor = 'zoom-in';

  container.appendChild(img);
  content.appendChild(container);

  // 右下角缩放箭头
  const r = document.createElement('div');
  r.className = 'resize-arrow';
  r.innerText = '⤢';

  win.append(bar, content, r);
  desk.appendChild(win);

  // 滚轮缩放图片 (仅PC，手机无滚轮但保留逻辑无碍)
  const wheelHandler = (e) => {
    e.preventDefault();
    e.stopPropagation();
    let currentWidth = img.style.width;
    let percent = parseFloat(currentWidth);
    if (isNaN(percent) || currentWidth.includes('%')) {
      // 如果是百分比形式，提取数值
      let match = currentWidth.match(/^(\d+(?:\.\d+)?)%/);
      if (match) percent = parseFloat(match[1]);
      else percent = 100;
    } else {
      // 如果是px形式，转为相对父容器的百分比? 简单起见转为px不好控制，我们强制统一使用百分比
      // 为了统一，检测如果是px则改为基于父容器宽度的百分比
      if (currentWidth.includes('px')) {
        let pxVal = parseFloat(currentWidth);
        let parentWidth = container.clientWidth;
        percent = parentWidth > 0 ? (pxVal / parentWidth) * 100 : 100;
      } else {
        percent = 100;
      }
    }
    // 根据滚轮方向调整 (向下缩小，向上放大)
    let delta = e.deltaY > 0 ? -10 : 10;
    percent = Math.min(500, Math.max(20, percent + delta));  // 限制20%~500%
    img.style.width = percent + '%';
  };
  // 使用被动监听以提升滚动性能，但需要preventDefault, 不能被动
  img.addEventListener('wheel', wheelHandler, { passive: false });
  container.addEventListener('wheel', wheelHandler, { passive: false }); // 双重保障

  // --- 使窗口可拖动/缩放 (复用之前的逻辑, 注意防冲突) ---
  let drag = false, sx = 0, sy = 0, ox = 0, oy = 0;
  const nh = 80;
  bar.addEventListener('mousedown', (e) => {
    if (isMobile) return;
    if (e.target === closeBtn) return;  // 关闭按钮不拖动
    e.preventDefault();
    drag = true;
    sx = e.clientX; sy = e.clientY;
    ox = win.offsetLeft; oy = win.offsetTop;
  });

  const mouseMoveHandler = (e) => {
    if (!drag) return;
    let nx = ox + e.clientX - sx;
    let ny = oy + e.clientY - sy;
    nx = Math.max(0, Math.min(nx, window.innerWidth - win.offsetWidth));
    ny = Math.max(nh + 10, Math.min(ny, window.innerHeight - win.offsetHeight));
    win.style.left = nx + 'px';
    win.style.top = ny + 'px';
  };
  const mouseUpHandler = () => { drag = false; };

  window.addEventListener('mousemove', mouseMoveHandler);
  window.addEventListener('mouseup', mouseUpHandler);

  // 缩放
  let resize = false;
  r.addEventListener('mousedown', (e) => {
    if (isMobile) return;
    e.stopPropagation();
    resize = true;
  });
  const resizeMoveHandler = (e) => {
    if (!resize) return;
    let w = e.clientX - win.offsetLeft;
    let h = e.clientY - win.offsetTop;
    w = Math.max(260, Math.min(w, window.innerWidth - win.offsetLeft));
    h = Math.max(220, Math.min(h, window.innerHeight - win.offsetTop));
    win.style.width = w + 'px';
    win.style.height = h + 'px';
  };
  const resizeUpHandler = () => { resize = false; };
  window.addEventListener('mousemove', resizeMoveHandler);
  window.addEventListener('mouseup', resizeUpHandler);

  // 窗口关闭时移除监听 (可选，但为了简洁保留全局，窗口移除后监听还在但无害)
  // 置顶
  win.addEventListener('mousedown', () => { win.style.zIndex = ++zIndex; });
}

// 监听双击图片 (背景图片不是img，安全)
document.addEventListener('dblclick', (e) => {
  const target = e.target;
  if (target.tagName === 'IMG') {
    // 避免在弹出窗口内的图片再次弹出 (可以加限制，但也可以无限嵌套；这里限制如果祖先有.image-popup就不触发)
    if (target.closest('.image-popup')) return;
    e.stopPropagation();
    const src = target.src;
    if (src) {
      createImagePopup(src);
    }
  }
});
</script>
